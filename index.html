<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>方格线移动颜色切换游戏</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    
    <!-- Tailwind 配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        secondary: '#10B981',
                        accent: '#EF4444',
                        neutral: '#F3F4F6',
                    },
                    fontFamily: {
                        game: ['Arial', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        @layer utilities {
            .grid-cell {
                @apply border border-gray-300 transition-all duration-200;
            }
            .player-marker {
                @apply w-6 h-6 bg-primary rounded-full transition-all duration-150 z-10;
            }
            .btn-control {
                @apply w-12 h-12 bg-gray-200 rounded-lg flex items-center justify-center text-xl hover:bg-primary hover:text-white transition-all duration-200 active:scale-95;
            }
            .grid-container {
                @apply border-2 border-gray-400 rounded-lg overflow-hidden relative;
            }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-4 font-game">
    <div class="max-w-3xl w-full bg-white rounded-xl shadow-lg p-6 md:p-8">
        <h1 class="text-[clamp(1.5rem,3vw,2.5rem)] font-bold text-center text-gray-800 mb-6">方格线移动颜色切换游戏</h1>
        
        <div class="mb-6 flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-2">
                <label for="grid-size" class="text-gray-700 font-medium">网格大小:</label>
                <select id="grid-size" class="border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary">
                    <option value="3">3×3</option>
                    <option value="4" selected>4×4</option>
                    <option value="5">5×5</option>
                    <option value="6">6×6</option>
                </select>
            </div>
            
            <div class="flex items-center gap-4">
                <button id="reset-btn" class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-4 py-2 rounded-md transition-all flex items-center gap-2">
                    <i class="fa fa-refresh"></i> 重置
                </button>
                <div class="text-gray-700">
                    移动次数: <span id="move-count" class="font-bold text-primary">0</span>
                </div>
            </div>
        </div>
        
        <!-- 游戏网格容器 -->
        <div class="flex justify-center mb-8">
            <div id="game-container" class="relative">
                <div id="game-grid" class="grid-container"></div>
                <div id="player-marker" class="player-marker absolute"></div>
            </div>
        </div>
        
        <!-- 控制按钮 -->
        <div class="flex justify-center gap-4">
            <div class="flex flex-col items-center gap-4">
                <button id="up-btn" class="btn-control">
                    <i class="fa fa-arrow-up"></i>
                </button>
                <div class="flex gap-4">
                    <button id="left-btn" class="btn-control">
                        <i class="fa fa-arrow-left"></i>
                    </button>
                    <button id="down-btn" class="btn-control">
                        <i class="fa fa-arrow-down"></i>
                    </button>
                    <button id="right-btn" class="btn-control">
                        <i class="fa fa-arrow-right"></i>
                    </button>
                </div>
            </div>
        </div>
        
        <!-- 游戏说明 -->
        <div class="mt-8 text-gray-600 text-sm md:text-base">
            <h2 class="font-bold text-gray-800 mb-2">游戏说明:</h2>
            <ul class="list-disc pl-5 space-y-1">
                <li>使用方向键或屏幕按钮控制蓝色标记沿格子线移动</li>
                <li>穿过格子线时，相邻的格子会在红色和白色之间切换</li>
                <li>尝试将所有格子变成红色，看看需要多少步数！</li>
            </ul>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 游戏状态
            let gameState = {
                gridSize: 4,          // 默认4×4网格
                cellSize: 60,         // 每个格子的大小(px)
                playerPosition: {x: 0, y: 0},  // 玩家在网格线上的位置(线交叉点坐标)
                grid: [],             // 网格状态，true表示红色，false表示白色
                moveCount: 0,         // 移动次数
                lastCrossedLine: null // 最后穿过的线，防止重复切换
            };
            
            // DOM元素
            const gameGrid = document.getElementById('game-grid');
            const playerMarker = document.getElementById('player-marker');
            const gameContainer = document.getElementById('game-container');
            const gridSizeSelect = document.getElementById('grid-size');
            const resetBtn = document.getElementById('reset-btn');
            const moveCountDisplay = document.getElementById('move-count');
            const upBtn = document.getElementById('up-btn');
            const downBtn = document.getElementById('down-btn');
            const leftBtn = document.getElementById('left-btn');
            const rightBtn = document.getElementById('right-btn');
            
            // 初始化游戏
            function initGame() {
                // 重置游戏状态
                gameState.gridSize = parseInt(gridSizeSelect.value);
                gameState.cellSize = window.innerWidth < 640 ? 40 : 60; // 响应式单元格大小
                gameState.playerPosition = {x: 0, y: 0};  // 从左上角开始
                gameState.moveCount = 0;
                gameState.lastCrossedLine = null;
                moveCountDisplay.textContent = '0';
                
                // 初始化网格 - 全部为白色(false)
                gameState.grid = Array(gameState.gridSize)
                    .fill()
                    .map(() => Array(gameState.gridSize).fill(false));
                
                // 渲染网格和玩家
                renderGrid();
                updatePlayerPosition();
            }
            
            // 渲染网格
            function renderGrid() {
                // 清空现有内容
                gameGrid.innerHTML = '';
                
                // 设置网格容器大小
                const gridDimension = gameState.gridSize * gameState.cellSize;
                gameGrid.style.width = `${gridDimension}px`;
                gameGrid.style.height = `${gridDimension}px`;
                
                // 设置游戏容器大小（为了标记能在边缘显示完整）
                gameContainer.style.width = `${gridDimension}px`;
                gameContainer.style.height = `${gridDimension}px`;
                
                // 创建网格单元格
                for (let y = 0; y < gameState.gridSize; y++) {
                    for (let x = 0; x < gameState.gridSize; x++) {
                        const cell = document.createElement('div');
                        cell.className = 'grid-cell absolute';
                        cell.style.width = `${gameState.cellSize}px`;
                        cell.style.height = `${gameState.cellSize}px`;
                        cell.style.left = `${x * gameState.cellSize}px`;
                        cell.style.top = `${y * gameState.cellSize}px`;
                        cell.style.backgroundColor = gameState.grid[y][x] ? '#EF4444' : '#FFFFFF';
                        gameGrid.appendChild(cell);
                    }
                }
            }
            
            // 更新玩家位置显示
            function updatePlayerPosition() {
                // 计算玩家在容器中的绝对位置
                const left = gameState.playerPosition.x * gameState.cellSize - 12; // 减去一半标记大小
                const top = gameState.playerPosition.y * gameState.cellSize - 12;
                
                playerMarker.style.left = `${left}px`;
                playerMarker.style.top = `${top}px`;
            }
            
            // 移动玩家（沿格子线）
            function movePlayer(dx, dy) {
                // 计算新位置
                const newX = gameState.playerPosition.x + dx;
                const newY = gameState.playerPosition.y + dy;
                
                // 检查是否在网格线范围内（可以移动到最边缘的线）
                if (newX >= 0 && newX <= gameState.gridSize && newY >= 0 && newY <= gameState.gridSize) {
                    // 检查是否穿过了垂直线
                    if (dx !== 0 && newX !== gameState.playerPosition.x) {
                        const lineX = dx > 0 ? gameState.playerPosition.x :newX;
                        
                        
                        toggleAdjacentCells(lineX, gameState.playerPosition.y-1, 'horizontal');
                        gameState.moveCount++;
                        moveCountDisplay.textContent = gameState.moveCount;
                    }
                    
                    // 检查是否穿过了水平线
                    if (dy !== 0 && newY !== gameState.playerPosition.y) {
                        
                        const lineY = dy > 0 ? gameState.playerPosition.y : newY;
                        //console.log("Yx", lineY, gameState.playerPosition.x-1);
                        toggleAdjacentCells(gameState.playerPosition.x - 1, lineY, 'vertical');
                        gameState.moveCount++;
                        moveCountDisplay.textContent = gameState.moveCount;
                        
                    }
                    
                    // 更新玩家位置
                    gameState.playerPosition = {x: newX, y: newY};
                    updatePlayerPosition();
                    
                    // 重新渲染网格（更新颜色）
                    renderGrid();
                    
                    // 检查是否所有格子都变成红色
                    checkWinCondition();
                }
            }
            
            // 切换线旁边的格子颜色
            function toggleAdjacentCells(x, y, direction) {
                if (direction === 'vertical') {
                    // 垂直线：切换左边和右边的格子（如果存在）
                    if (x >= 0 && x < gameState.gridSize) {
                        gameState.grid[y][x] = !gameState.grid[y][x];
                    }
                    if (x + 1 < gameState.gridSize) {
                        gameState.grid[y][x + 1] = !gameState.grid[y][x + 1];
                    }
                } else if (direction === 'horizontal') {
                    // 水平线：切换上边和下边的格子（如果存在）
                    if (y >= 0 && y < gameState.gridSize) {
                        gameState.grid[y][x] = !gameState.grid[y][x];
                    }
                    if (y + 1 < gameState.gridSize) {
                        gameState.grid[y + 1][x] = !gameState.grid[y + 1][x];
                    }
                }
            }
            
            // 检查胜利条件（所有格子都为红色）
            function checkWinCondition() {
                for (let y = 0; y < gameState.gridSize; y++) {
                    for (let x = 0; x < gameState.gridSize; x++) {
                        if (!gameState.grid[y][x]) {
                            return; // 还有白色格子，未胜利
                        }
                    }
                }
                
                // 所有格子都是红色，游戏胜利
                setTimeout(() => {
                    alert(`恭喜！你用了 ${gameState.moveCount} 步将所有格子变成了红色！`);
                }, 300);
            }
            
            // 事件监听
            upBtn.addEventListener('click', () => movePlayer(0, -1));
            downBtn.addEventListener('click', () => movePlayer(0, 1));
            leftBtn.addEventListener('click', () => movePlayer(-1, 0));
            rightBtn.addEventListener('click', () => movePlayer(1, 0));
            
            // 键盘控制
            document.addEventListener('keydown', (e) => {
                switch(e.key) {
                    case 'ArrowUp':
                        movePlayer(0, -1);
                        break;
                    case 'ArrowDown':
                        movePlayer(0, 1);
                        break;
                    case 'ArrowLeft':
                        movePlayer(-1, 0);
                        break;
                    case 'ArrowRight':
                        movePlayer(1, 0);
                        break;
                }
            });
            
            // 重置游戏
            resetBtn.addEventListener('click', initGame);
            
            // 改变网格大小
            gridSizeSelect.addEventListener('change', initGame);
            
            // 窗口大小变化时重新调整
            window.addEventListener('resize', () => {
                const oldSize = gameState.cellSize;
                gameState.cellSize = window.innerWidth < 640 ? 40 : 60;
                if (oldSize !== gameState.cellSize) {
                    renderGrid();
                    updatePlayerPosition();
                }
            });
            
            // 初始化游戏
            initGame();
        });
    </script>
</body>
</html>
