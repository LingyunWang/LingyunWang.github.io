<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>方格线移动游戏</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        accent: '#EF4444',
                    },
                }
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        @layer utilities {
            .grid-cell {
                @apply border border-gray-300 transition-all duration-200;
            }
            .player-marker {
                @apply w-6 h-6 bg-primary rounded-full transition-all duration-150 z-10;
            }
            .grid-line {
                @apply bg-gray-400 absolute;
            }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-4">
    <div class="max-w-3xl w-full bg-white rounded-xl shadow-lg p-6 md:p-8">
        <h1 class="text-2xl md:text-3xl font-bold text-center text-gray-800 mb-6">方格线移动游戏</h1>
        
        <div class="mb-6 flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-2">
                <label for="grid-size" class="text-gray-700 font-medium">网格大小:</label>
                <select id="grid-size" class="border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary">
                    <option value="3">3×3</option>
                    <option value="4" selected>4×4</option>
                    <option value="5">5×5</option>
                    <option value="6">6×6</option>
                    <option value="7">7×7</option>
                </select>
            </div>
            
            <div class="flex items-center gap-4">
                <button id="reset-btn" class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-4 py-2 rounded-md transition-all">
                    <i class="fa fa-refresh mr-1"></i> 重置
                </button>
                <div class="text-gray-700">
                    步数: <span id="move-count" class="font-bold text-primary">0</span>
                </div>
            </div>
        </div>
        
        <!-- 游戏区域 -->
        <div class="flex justify-center mb-8">
            <div id="game-container" class="relative border-2 border-gray-400 rounded-lg"></div>
        </div>
        
        <!-- 控制按钮 -->
        <div class="flex justify-center gap-4">
            <div class="flex flex-col items-center gap-4">
                <button id="up-btn" class="w-12 h-12 bg-gray-200 rounded-lg flex items-center justify-center text-xl hover:bg-primary hover:text-white transition-all">
                    <i class="fa fa-arrow-up"></i>
                </button>
                <div class="flex gap-4">
                    <button id="left-btn" class="w-12 h-12 bg-gray-200 rounded-lg flex items-center justify-center text-xl hover:bg-primary hover:text-white transition-all">
                        <i class="fa fa-arrow-left"></i>
                    </button>
                    <button id="down-btn" class="w-12 h-12 bg-gray-200 rounded-lg flex items-center justify-center text-xl hover:bg-primary hover:text-white transition-all">
                        <i class="fa fa-arrow-down"></i>
                    </button>
                    <button id="right-btn" class="w-12 h-12 bg-gray-200 rounded-lg flex items-center justify-center text-xl hover:bg-primary hover:text-white transition-all">
                        <i class="fa fa-arrow-right"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 游戏状态
            let gameState = {
                gridSize: 4,          // 网格大小
                cellSize: 60,         // 每个格子的大小(px)
                // 玩家位置使用像素坐标，确保沿网格线移动
                playerPosition: {x: 0, y: 0},  
                grid: [],             // 网格状态，true为红色，false为白色
                moveCount: 0,         // 移动次数
                crossingLines: new Set() // 已穿过的线，防止重复切换
            };
            
            // DOM元素
            const gameContainer = document.getElementById('game-container');
            const gridSizeSelect = document.getElementById('grid-size');
            const resetBtn = document.getElementById('reset-btn');
            const moveCountDisplay = document.getElementById('move-count');
            const directionButtons = {
                up: document.getElementById('up-btn'),
                down: document.getElementById('down-btn'),
                left: document.getElementById('left-btn'),
                right: document.getElementById('right-btn')
            };
            
            // 初始化玩家标记
            const playerMarker = document.createElement('div');
            playerMarker.className = 'player-marker absolute';
            gameContainer.appendChild(playerMarker);
            
            // 初始化游戏
            function initGame() {
                // 清空游戏容器
                gameContainer.innerHTML = '';
                gameContainer.appendChild(playerMarker);
                
                // 更新游戏状态
                gameState.gridSize = parseInt(gridSizeSelect.value);
                gameState.cellSize = window.innerWidth < 640 ? 50 : 60;
                const startPos = 0; // 从左上角网格线交点开始
                gameState.playerPosition = {x: startPos, y: startPos};
                gameState.moveCount = 0;
                gameState.crossingLines = new Set();
                moveCountDisplay.textContent = '0';
                
                // 初始化网格状态（全部白色）
                gameState.grid = Array(gameState.gridSize)
                    .fill()
                    .map(() => Array(gameState.gridSize).fill(false));
                
                // 绘制网格和网格线
                drawGrid();
                updatePlayerPosition();
            }
            
            // 绘制网格和网格线
            function drawGrid() {
                const containerSize = gameState.gridSize * gameState.cellSize;
                gameContainer.style.width = `${containerSize}px`;
                gameContainer.style.height = `${containerSize}px`;
                
                // 绘制格子
                for (let y = 0; y < gameState.gridSize; y++) {
                    for (let x = 0; x < gameState.gridSize; x++) {
                        const cell = document.createElement('div');
                        cell.className = 'grid-cell absolute';
                        cell.style.width = `${gameState.cellSize}px`;
                        cell.style.height = `${gameState.cellSize}px`;
                        cell.style.left = `${x * gameState.cellSize}px`;
                        cell.style.top = `${y * gameState.cellSize}px`;
                        cell.style.backgroundColor = gameState.grid[y][x] ? '#EF4444' : '#FFFFFF';
                        gameContainer.appendChild(cell);
                    }
                }
                
                // 绘制网格线（更清晰地展示线的存在）
                // 垂直线
                for (let x = 0; x <= gameState.gridSize; x++) {
                    const line = document.createElement('div');
                    line.className = 'grid-line';
                    line.style.width = '1px';
                    line.style.height = '100%';
                    line.style.left = `${x * gameState.cellSize}px`;
                    line.style.top = '0';
                    gameContainer.appendChild(line);
                }
                
                // 水平线
                for (let y = 0; y <= gameState.gridSize; y++) {
                    const line = document.createElement('div');
                    line.className = 'grid-line';
                    line.style.width = '100%';
                    line.style.height = '1px';
                    line.style.left = '0';
                    line.style.top = `${y * gameState.cellSize}px`;
                    gameContainer.appendChild(line);
                }
            }
            
            // 更新玩家位置
            function updatePlayerPosition() {
                // 确保玩家始终在线上（网格线交点）
                playerMarker.style.left = `${gameState.playerPosition.x - 12}px`;
                playerMarker.style.top = `${gameState.playerPosition.y - 12}px`;
            }
            
            // 移动玩家（沿网格线）
            function movePlayer(direction) {
                // 计算目标位置（下一个网格线交点）
                let targetX = gameState.playerPosition.x;
                let targetY = gameState.playerPosition.y;
                
                switch(direction) {
                    case 'up':
                        targetY -= gameState.cellSize;
                        break;
                    case 'down':
                        targetY += gameState.cellSize;
                        break;
                    case 'left':
                        targetX -= gameState.cellSize;
                        break;
                    case 'right':
                        targetX += gameState.cellSize;
                        break;
                }
                
                // 检查是否在有效范围内
                const maxPos = gameState.gridSize * gameState.cellSize;
                if (targetX >= 0 && targetX <= maxPos && targetY >= 0 && targetY <= maxPos) {
                    // 计算移动路径上穿过的线
                    const crossedLines = getCrossedLines(gameState.playerPosition, {x: targetX, y: targetY});
                    
                    // 处理穿过的每条线
                    crossedLines.forEach(line => {
                        const lineKey = `${line.type}-${line.pos}-${line.axis}`;
                        toggleAdjacentCells(line);
                        
                        // 只处理未穿过的线
                        if (!gameState.crossingLines.has(lineKey)) {
                            gameState.crossingLines.add(lineKey);    
                        }
                    });
                    
                    // 更新玩家位置
                    gameState.playerPosition = {x: targetX, y: targetY};
                    updatePlayerPosition();
                    
                    // 增加移动计数
                    gameState.moveCount++;
                    moveCountDisplay.textContent = gameState.moveCount;
                    
                    // 重新绘制网格（更新颜色）
                    drawGrid();
                    
                    // 检查胜利条件
                    checkWinCondition();
                }
            }
            
            // 获取移动过程中穿过的线
            function getCrossedLines(from, to) {
                const crossedLines = [];
                
                // 水平移动（左右）
                if (from.x !== to.x) {
                    const direction = from.x < to.x ? 'right' : 'left';
                    const start = Math.min(from.x, to.x);
                    const end = Math.max(from.x, to.x);
                    
                    // 找出所有穿过的垂直线
                    for (let x = start + gameState.cellSize; x <= end; x += gameState.cellSize) {
                        const gridX = x / gameState.cellSize;
                        const yPos = from.y / gameState.cellSize;
                        crossedLines.push({
                            type: 'horizontal',
                            pos: gridX-1,
                            axis: yPos
                        });
                    }
                }
                
                // 垂直移动（上下）
                if (from.y !== to.y) {
                    const direction = from.y < to.y ? 'down' : 'up';
                    const start = Math.min(from.y, to.y);
                    const end = Math.max(from.y, to.y);
                    
                    // 找出所有穿过的水平线
                    for (let y = start + gameState.cellSize; y <= end; y += gameState.cellSize) {
                        const gridY = y / gameState.cellSize;
                        const xPos = from.x / gameState.cellSize;
                        crossedLines.push({
                            type: 'vertical',
                            pos: xPos,
                            axis: gridY - 1
                        });
                    }
                }
                
                return crossedLines;
            }
            
            // 切换线旁边的格子颜色
            function toggleAdjacentCells(line) {
                if (line.type === 'vertical') {
                    // 垂直线：影响左右两个格子
                    const x = line.pos - 1; // 左边格子的x坐标
                    const y = line.axis;
                    
                    // 切换左边格子（如果存在）
                    if (x >= 0 && x < gameState.gridSize && y >= 0 && y < gameState.gridSize) {
                        gameState.grid[y][x] = !gameState.grid[y][x];
                    }
                    
                    // 切换右边格子（如果存在）
                    if (x + 1 < gameState.gridSize && y >= 0 && y < gameState.gridSize) {
                        gameState.grid[y][x + 1] = !gameState.grid[y][x + 1];
                    }
                } else if (line.type === 'horizontal') {
                    // 水平线：影响上下两个格子
                    const x = line.pos; // 上边格子的y坐标
                    const y = line.axis;
                    
                    // 切换上边格子（如果存在）
                    if (y-1 >= 0 && y-1 < gameState.gridSize && x >= 0 && x < gameState.gridSize) {
                        gameState.grid[y-1][x] = !gameState.grid[y-1][x];
                    }
                    
                    // 切换下边格子（如果存在）
                    if (y < gameState.gridSize && x >= 0 && x < gameState.gridSize) {
                        gameState.grid[y][x] = !gameState.grid[y][x];
                    }
                }
            }
            
            // 检查胜利条件
            function checkWinCondition() {
                for (let y = 0; y < gameState.gridSize; y++) {
                    for (let x = 0; x < gameState.gridSize; x++) {
                        if (!gameState.grid[y][x]) {
                            return; // 还有白色格子
                        }
                    }
                }
                setTimeout(() => alert(`恭喜！你用了 ${gameState.moveCount} 步完成了游戏！`), 300);
            }
            
            // 事件监听
            directionButtons.up.addEventListener('click', () => movePlayer('up'));
            directionButtons.down.addEventListener('click', () => movePlayer('down'));
            directionButtons.left.addEventListener('click', () => movePlayer('left'));
            directionButtons.right.addEventListener('click', () => movePlayer('right'));
            
            // 键盘控制
            document.addEventListener('keydown', (e) => {
                switch(e.key) {
                    case 'ArrowUp': movePlayer('up'); break;
                    case 'ArrowDown': movePlayer('down'); break;
                    case 'ArrowLeft': movePlayer('left'); break;
                    case 'ArrowRight': movePlayer('right'); break;
                }
            });
            
            // 重置游戏
            resetBtn.addEventListener('click', initGame);
            gridSizeSelect.addEventListener('change', initGame);
            
            // 窗口大小变化时重新调整
            window.addEventListener('resize', () => {
                const oldSize = gameState.cellSize;
                gameState.cellSize = window.innerWidth < 640 ? 50 : 60;
                if (oldSize !== gameState.cellSize) {
                    // 重新计算玩家位置以适应新的单元格大小
                    const ratio = gameState.cellSize / oldSize;
                    gameState.playerPosition.x *= ratio;
                    gameState.playerPosition.y *= ratio;
                    initGame();
                }
            });
            
            // 启动游戏
            initGame();
        });
    </script>
</body>
</html>
